name: Update UAP Release Records

on:
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * *"

permissions:
  contents: write

jobs:
  update-records:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium --with-deps

      - name: Refresh records
        run: npm run update-records

      - name: Show generated media files
        run: |
          echo "PDF count:"
          find media/pdf -type f | wc -l || true
          echo "Image count:"
          find media/images -type f | wc -l || true
          echo "Git status:"
          git status --short

      - name: Commit records and media
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/release-01-records.json
          git add media/pdf
          git add media/images

          echo "Staged files:"
          git status --short

          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Update UAP Release 01 records and media"
            git push
          fi
